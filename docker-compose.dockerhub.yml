services:
  backend:
    image: chansht/laconslanet-backend:${BACKEND_TAG:-latest}
    pull_policy: always
    container_name: laconslanet-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    expose:
      - "5000"
    volumes:
      - backend_uploads:/app/backend/uploads
    depends_on:
      - mongo
    networks:
      - internal
    restart: unless-stopped

  frontend:
    image: chansht/laconslanet-frontend:${FRONTEND_TAG:-latest}
    pull_policy: always
    container_name: laconslanet-frontend
    env_file:
      - .env
    environment:
      API_BASE_URL: "${API_BASE_URL:-}"
    ports:
      - "${FRONTEND_PORT:-5500}:80"
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

  mongo:
    image: mongo:7
    pull_policy: always
    container_name: laconslanet-mongo
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    restart: unless-stopped

volumes:
  mongo_data:
  backend_uploads:

networks:
  internal:
    driver: bridge
