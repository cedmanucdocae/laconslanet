services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: laconslanet-backend
    env_file:
      - .env
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: laconslanet-frontend
    env_file:
      - .env
    environment:
      API_BASE_URL: "${API_BASE_URL:-http://localhost:5000}"
      FRONTEND_PORT: "${FRONTEND_PORT:-5500}"
      FRONTEND_ENTRY: "${FRONTEND_ENTRY:-Login/index.html}"
    ports:
      - "${FRONTEND_PORT:-5500}:${FRONTEND_PORT:-5500}"
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: laconslanet-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
