services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: laconslanet-backend
    env_file:
      - .env
    expose:
      - "5000"
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      - mongo
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: laconslanet-frontend
    env_file:
      - .env
    environment:
      API_BASE_URL: "${API_BASE_URL:-http://localhost:5500}"
    ports:
      - "${FRONTEND_PORT:-5500}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: laconslanet-mongo
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  internal:
    driver: bridge
